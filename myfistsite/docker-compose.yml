services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myfistsite-web
    env_file:
      - .env
    command: sh /app/entrypoint.sh
    ports:
      - "8000:8000"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
    restart: always

  loki:
    image: grafana/loki:3.7.0
    container_name: myfistsite-loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    restart: always
    profiles:
      - monitoring

  promtail:
    image: grafana/promtail:3.7.0
    container_name: myfistsite-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: always
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:12.4.0
    container_name: myfistsite-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    restart: always
    profiles:
      - monitoring

volumes:
  loki_data:
  grafana_data:
